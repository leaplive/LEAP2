<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time log viewer for a LEAP2 experiment.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
  <title>Logs — LEAP2</title>
  <script>(function(){var t=localStorage.getItem("leap-theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.classList.add("dark")})()</script>
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/theme-toggle.js" defer></script>
  <style>
    tr.deleting td {
      opacity: 0 !important;
      transform: translateX(-10px);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    tr.deleting {
      pointer-events: none;
    }
  </style>
</head>
<body data-page="logs">
  <a class="skip-to-content" href="#main">Skip to content</a>
  <script src="/static/navbar.js"></script>

  <main class="container" id="main">
    <nav class="breadcrumb">
      <a href="/">Experiments</a>
      <span class="breadcrumb-sep">/</span>
      <a href="#" id="bc-exp-link">default</a>
      <span class="breadcrumb-sep">/</span>
      <span>Logs</span>
    </nav>

    <div class="page-header">
      <h1>Logs <span class="auto-badge" id="auto-label"></span></h1>
      <p>Real-time view of RPC call logs for this experiment.</p>
    </div>

    <div id="log-sparkline" class="log-sparkline-wrap"></div>
    <div id="error" class="alert alert-error hidden"></div>

    <div class="controls">
      <div class="form-group">
        <label class="form-label" for="filter-student">Student</label>
        <select class="input" id="filter-student"><option value="">All</option></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="filter-func">Function</label>
        <select class="input" id="filter-func"><option value="">All</option></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="filter-trial">Trial</label>
        <select class="input" id="filter-trial"><option value="">All</option></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="filter-n">Rows</label>
        <input class="input" type="number" id="filter-n" value="100" min="1" max="10000" style="width:80px">
      </div>
      <div class="form-group" style="display:flex; gap:0.5rem;">
        <button class="btn btn-primary" id="refresh-btn">Refresh</button>
        <button class="btn" id="auto-btn">Auto: Off</button>
        <button class="btn btn-danger hidden" id="clear-logs-btn">Clear Logs</button>
      </div>
    </div>

    <div id="status" class="log-status"></div>

    <div class="table-wrap">
      <table class="table hidden" id="log-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Student</th>
            <th>Trial</th>
            <th>Function</th>
            <th>Args</th>
            <th>Result</th>
            <th id="log-actions-header" class="hidden">Actions</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>

    <div id="empty" class="empty-state hidden">
      <h2>No logs yet</h2>
      <p>Make some RPC calls to see them appear here.</p>
    </div>
  </main>

  <script src="/static/footer.js"></script>
  <script type="module">
    import { LogClient } from "/static/logclient.js";

    const expName = window.LEAP_EXP || new URLSearchParams(window.location.search).get("exp") || "default";
    var bcLink = document.getElementById("bc-exp-link");
    if (bcLink) { bcLink.href = "/exp/" + expName + "/ui/dashboard.html"; bcLink.textContent = expName; }

    const sparkEl = document.getElementById("log-sparkline");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");
    const tableEl = document.getElementById("log-table");
    const bodyEl = document.getElementById("log-body");
    const emptyEl = document.getElementById("empty");
    const studentSel = document.getElementById("filter-student");
    const funcSel = document.getElementById("filter-func");
    const trialSel = document.getElementById("filter-trial");
    const nInput = document.getElementById("filter-n");
    const autoBtn = document.getElementById("auto-btn");
    const autoLabel = document.getElementById("auto-label");

    let client;
    let autoInterval = null;
    let isAdmin = false;

    function buildSparkline(buckets, color, h) {
      if (!buckets.length) return "";
      var max = Math.max.apply(null, buckets);
      if (max === 0) return "";
      var w = 400, n = buckets.length;
      var step = w / (n - 1 || 1);
      var pts = buckets.map(function (v, i) {
        return (i * step).toFixed(1) + "," + (h - (v / max) * (h - 4) - 2).toFixed(1);
      });
      var fill = pts.concat([ w+","+h, "0,"+h ]).join(" ");
      return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">' +
        '<polygon points="'+fill+'" fill="'+color+'" opacity="0.1"/>' +
        '<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>';
    }

    try {
      client = new LogClient({ experiment: expName });
    } catch (e) {
      errorEl.textContent = e.message;
      errorEl.classList.remove("hidden");
    }

    async function checkAdmin() {
      try {
        const res = await fetch("/api/auth-status", { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          isAdmin = !!data.admin;
        }
      } catch (_) {}
    }

    async function loadOptions() {
      if (!client) return;
      try {
        const opts = await client.getLogOptions();
        (opts.students || []).forEach(function (s) {
          const o = document.createElement("option");
          o.value = s;
          o.textContent = s;
          studentSel.appendChild(o);
        });
        (opts.trials || []).forEach(function (t) {
          const o = document.createElement("option");
          o.value = t;
          o.textContent = t;
          trialSel.appendChild(o);
        });
      } catch (_) {}

      try {
        const res = await fetch("/exp/" + expName + "/functions");
        if (res.ok) {
          const funcs = await res.json();
          Object.keys(funcs).sort().forEach(function (name) {
            const o = document.createElement("option");
            o.value = name;
            o.textContent = name;
            funcSel.appendChild(o);
          });
        }
      } catch (_) {}
    }

    async function loadLogs() {
      if (!client) return;
      errorEl.classList.add("hidden");
      const filters = {};
      if (studentSel.value) filters.studentId = studentSel.value;
      if (funcSel.value) filters.funcName = funcSel.value;
      if (trialSel.value) filters.trial = trialSel.value;
      filters.n = parseInt(nInput.value, 10) || 100;
      filters.order = "latest";

      try {
        const { logs } = await client.getLogs(filters);
        bodyEl.innerHTML = "";

        if (!logs || logs.length === 0) {
          tableEl.classList.add("hidden");
          emptyEl.classList.remove("hidden");
          sparkEl.innerHTML = "";
          statusEl.textContent = "0 entries";
          return;
        }

        tableEl.classList.remove("hidden");
        emptyEl.classList.add("hidden");
        statusEl.textContent = logs.length + " entr" + (logs.length === 1 ? "y" : "ies");

        var actionsHeader = document.getElementById("log-actions-header");
        if (actionsHeader) {
          if (isAdmin) actionsHeader.classList.remove("hidden");
          else actionsHeader.classList.add("hidden");
        }

        var buckets = new Array(24).fill(0);
        var now = Date.now(), hour = 3600000;
        logs.forEach(function (l) {
          var age = now - new Date(l.ts).getTime();
          var idx = 23 - Math.min(23, Math.floor(age / hour));
          buckets[idx]++;
        });
        var color = getComputedStyle(document.documentElement).getPropertyValue("--color-primary").trim();
        sparkEl.innerHTML = buildSparkline(buckets, color, 48) +
          '<span class="spark-label">Activity \u00b7 last 24 hours</span>';

        logs.forEach(function (log) {
          const tr = document.createElement("tr");
          tr.dataset.logId = log.id;
          const d = new Date(log.ts);
          var rowHtml =
            "<td style='font-family:var(--font-mono);font-size:.8125rem'>" + log.id + "</td>" +
            "<td class='log-ts'>" + d.toLocaleTimeString() + " " + d.toLocaleDateString() + "</td>" +
            "<td>" + (log.student_id || "") + "</td>" +
            "<td>" + (log.trial || "") + "</td>" +
            "<td><code>" + (log.func_name || "") + "</code></td>" +
            "<td class='log-args' title='" + JSON.stringify(log.args, null, 2).replace(/'/g, "&#39;") + "'>" + JSON.stringify(log.args) + "</td>" +
            (log.error
              ? "<td class='log-result log-error' title='" + (log.error || "").replace(/'/g, "&#39;") + "'>" + log.error + "</td>"
              : "<td class='log-result' title='" + JSON.stringify(log.result, null, 2).replace(/'/g, "&#39;") + "'>" + JSON.stringify(log.result) + "</td>");
          if (isAdmin) {
            rowHtml += "<td><button type='button' class='btn btn-sm btn-danger log-delete' data-log-id='" + log.id + "'>Delete</button></td>";
          }
          tr.innerHTML = rowHtml;
          bodyEl.appendChild(tr);
        });

        bodyEl.querySelectorAll(".log-delete").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = parseInt(btn.dataset.logId, 10);
            if (!id) return;
            if (!confirm("Delete this log entry? This cannot be undone.")) return;
            var deleteUrl = (window.location.origin || "") + "/exp/" + expName + "/admin/delete-log";
            fetch(deleteUrl, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ log_id: id })
            }).then(function (res) {
              if (res.ok) {
                var row = document.querySelector("#log-body tr[data-log-id='" + id + "']");
                if (row) {
                  row.classList.add("deleting");
                  setTimeout(function() {
                    row.remove();
                    var count = bodyEl.querySelectorAll("tr").length;
                    statusEl.textContent = count + " entr" + (count === 1 ? "y" : "ies");
                    if (count === 0) {
                      tableEl.classList.add("hidden");
                      emptyEl.classList.remove("hidden");
                      sparkEl.innerHTML = "";
                    }
                  }, 300);
                }
              } else {
                res.json().then(function (data) {
                  errorEl.textContent = data.detail || "Delete failed";
                  errorEl.classList.remove("hidden");
                }).catch(function () {
                  errorEl.textContent = "Delete failed";
                  errorEl.classList.remove("hidden");
                });
              }
            }).catch(function (err) {
              errorEl.textContent = err.message || "Delete failed";
              errorEl.classList.remove("hidden");
            });
          });
        });
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      }
    }

    function toggleAuto() {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        autoBtn.textContent = "Auto: Off";
        autoLabel.textContent = "";
      } else {
        autoInterval = setInterval(loadLogs, 3000);
        autoBtn.textContent = "Auto: On";
        autoLabel.textContent = "(refreshing every 3s)";
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadLogs);
    autoBtn.addEventListener("click", toggleAuto);

    // — Clear Logs button (admin only) —
    var clearLogsBtn = document.getElementById("clear-logs-btn");

    function updateClearBtn() {
      if (isAdmin) clearLogsBtn.classList.remove("hidden");
      else clearLogsBtn.classList.add("hidden");
      // Update label based on active filters
      var hasFilter = studentSel.value || trialSel.value || funcSel.value;
      clearLogsBtn.textContent = hasFilter ? "Clear Filtered Logs" : "Clear All Logs";
    }

    studentSel.addEventListener("change", updateClearBtn);
    trialSel.addEventListener("change", updateClearBtn);
    funcSel.addEventListener("change", updateClearBtn);

    clearLogsBtn.addEventListener("click", function () {
      var student = studentSel.value;
      var trial = trialSel.value;
      var func = funcSel.value;
      var parts = [];
      if (student) parts.push("student \"" + student + "\"");
      if (trial) parts.push("trial \"" + trial + "\"");
      if (func) parts.push("function \"" + func + "\"");
      var msg = parts.length
        ? "Delete ALL logs matching " + parts.join(" and ") + "? This cannot be undone."
        : "Delete ALL logs for this experiment? This cannot be undone.";
      if (!confirm(msg)) return;
      var body = {};
      if (student) body.student_id = student;
      if (trial) body.trial = trial;
      if (func) body.func_name = func;
      var url = (window.location.origin || "") + "/exp/" + expName + "/admin/delete-logs";
      fetch(url, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      }).then(function (res) {
        if (res.ok) {
          return res.json().then(function (data) {
            statusEl.textContent = (data.deleted || 0) + " logs deleted";
            loadLogs();
          });
        } else {
          return res.json().then(function (data) {
            errorEl.textContent = data.detail || "Delete failed";
            errorEl.classList.remove("hidden");
          });
        }
      }).catch(function (err) {
        errorEl.textContent = err.message || "Delete failed";
        errorEl.classList.remove("hidden");
      });
    });

    checkAdmin().then(function () { updateClearBtn(); return loadOptions(); }).then(loadLogs);
  </script>
</body>
</html>
